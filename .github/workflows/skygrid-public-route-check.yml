name: SKYGRID Public Route Check

on:
  workflow_dispatch:
  push:
    branches:
      - MVPuknowme
      - main
    paths:
      - 'api/**'
      - 'lib/**'
      - 'scripts/check-skygrid-public-routes.mjs'
      - 'vercel.json'
      - 'app.js'
      - 'package.json'
      - '.github/workflows/skygrid-public-route-check.yml'
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: read

env:
  SKYGRID_ROUTE_CHECK_TIMEOUT_MS: '15000'

jobs:
  route-check:
    name: Check public SKYGRID routes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run route check
        run: node scripts/check-skygrid-public-routes.mjs
